# Upstream source manifest for libcommon
#
# Each entry declares ONE upstream tarball. fetch-sources.sh reads this file,
# downloads url to sources/<name>-<version>.<ext>, verifies sha256, then
# extracts into sources/<name>/ (stripping the top-level directory if needed).
#
# build/<name>.sh consumes sources/<name>/ as its srcdir.

schema_version = 1

