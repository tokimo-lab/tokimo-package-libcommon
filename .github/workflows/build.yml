name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed for softprops/action-gh-release on tag push

jobs:
  linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config patchelf zstd \
            cmake meson ninja-build \
            autoconf automake libtool \
            python3 python3-pip

      - name: tool versions
        run: |
          gcc --version | head -1
          cmake --version | head -1
          patchelf --version
          python3 --version

      - name: fetch sources
        run: bash scripts/fetch-sources.sh

      - name: build L0
        run: bash scripts/build-all.sh --layer L0

      - name: verify SONAMEs against registry
        run: bash scripts/verify.sh

      - name: package
        env:
          VERSION: ${{ github.ref_name }}
        run: bash scripts/package.sh

      - name: list artifact contents
        run: |
          ls -lh install-linux-x86_64.tar.zst
          echo "── META.txt ──"
          cat install/META.txt

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-linux-x86_64
          path: install-linux-x86_64.tar.zst
          retention-days: 30

      - name: release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: install-linux-x86_64.tar.zst
          generate_release_notes: true
          fail_on_unmatched_files: true
