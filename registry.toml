# tokimo SONAME 全局注册表 — 单一所有权（SoT）契约
#
# 每个 SONAME 在三个仓库（libcommon / ffmpeg / libvips）中**全局唯一 owner**。
# 主仓 CI 通过 tools/check-soname-registry.ts 强制：解压三仓 artifact 后，
# 任意两仓的 SONAME 交集必须为空，且每个仓库的实际 SONAME 集合必须 ⊆ 本文件声明
# 的 status="built" 子集。
#
# status 字段（libcommon 专用）：
#   "built"   — 当前 release 已实际产出该 SONAME，CI 会校验存在性
#   "planned" — 计划纳入，尚未在当前 release 出现，CI 跳过校验
#
# 修改流程：动 SONAME 归属必须先改本文件 + bump libcommon major，再依次 rebuild 三仓。

schema_version = 1

# ────────────────────────────────────────────────────────────────────────────
# libcommon — 49 个共享底座 SONAME
# 当前 release: v0.2.0 — 49 / 49 built
# ────────────────────────────────────────────────────────────────────────────
[libcommon]
version = "0.3.0"
platforms = ["linux-x86_64", "macos-arm64"]

# 基础压缩 / 编码
[[libcommon.libs]]
soname = "libz.so.1"
status = "built"
source = "zlib"

