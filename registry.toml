# ────────────────────────────────────────────────────────────────────────────
# 系统库（永不打包，由宿主 glibc / gcc-runtime 提供）
# CI 检查时若发现这些 SONAME 出现在任何包内 → 报错。
# Windows 系统 DLL allowlist 在 scripts/verify.sh 内（kernel32 / user32 / ws2_32 /
# crypt32 / bcrypt 等 Win32 API）。
# ────────────────────────────────────────────────────────────────────────────
[system_excluded.linux]
sonames = [
  "ld-linux-x86-64.so.2",
  "libc.so.6",
  "libdl.so.2",
  "libgcc_s.so.1",
  "libm.so.6",
  "libpthread.so.0",
  "libresolv.so.2",
  "librt.so.1",
  "libstdc++.so.6",
]

