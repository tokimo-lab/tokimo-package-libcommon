# tokimo SONAME 全局注册表 — 单一所有权（SoT）契约
#
# 每个 SONAME 在三个仓库（libcommon / ffmpeg / libvips）中**全局唯一 owner**。
# 主仓 CI 通过 tools/check-soname-registry.ts 强制：解压三仓 artifact 后，
# 任意两仓的 SONAME 交集必须为空，且每个仓库的实际 SONAME 集合必须 ⊆ 本文件声明
# 的 status="built" 子集。
#
# status 字段（libcommon 专用）：
#   "built"   — 当前 release 已实际产出该 SONAME，CI 会校验存在性
#   "planned" — 计划纳入，尚未在当前 release 出现，CI 跳过校验
#
# 平台 column（linux / macos / windows）：
#   <basename>  — 该平台的实际文件 basename（macOS = dylib，Windows = DLL）
#   "skip"      — 该平台不构建该 entry（如 X11 family / BSD-only libs on Windows）
#   缺省          — 使用平台默认推导：
#                  Linux:   key = soname
#                  macOS:   libfoo.so.N → libfoo.N.dylib
#                  Windows: libfoo.so.N → libfoo-N.dll (mingw libtool default)
#
# 修改流程：动 SONAME 归属必须先改本文件 + bump libcommon major，再依次 rebuild 三仓。

schema_version = 1

# ────────────────────────────────────────────────────────────────────────────
# libcommon — 49 个共享底座 SONAME（Linux/macOS）+ 3 个 Windows toolchain runtime DLL
# 当前 release: v1.0.0 — 三平台 (linux-x86_64 / macos-arm64 / windows-x86_64)
# ────────────────────────────────────────────────────────────────────────────
[libcommon]
version = "1.0.0"
platforms = ["linux-x86_64", "macos-arm64", "windows-x86_64"]

