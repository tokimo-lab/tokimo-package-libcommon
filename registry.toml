# license: BSD-3-Clause
# The combined libtheora.so.0 (decoder+encoder) is built by upstream
# Makefile.am alongside the split libtheoradec.so.1 / libtheoraenc.so.1.
# We ship it so that consumers linking against the historical -ltheora
# (not -ltheoradec / -ltheoraenc) keep working.
windows = "libtheora-0.dll"

[[libcommon.libs]]
soname = "libtheoradec.so.1"
status = "built"
source = "libtheora"
# license: BSD-3-Clause
windows = "libtheoradec-1.dll"

[[libcommon.libs]]
soname = "libtheoraenc.so.1"
status = "built"
source = "libtheora"
# license: BSD-3-Clause
# On mingw, libtheora autotools merges enc symbols into the combined
# libtheora-0.dll (the historical pre-split layout); no separate
# libtheoraenc-1.dll is produced. ffmpeg links theoraenc symbols
# against libtheora-0.dll on Windows.
windows = "libtheora-0.dll"

